<!DOCTYPE html>
<html>

<head>

<title>User Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

h1{
margin-top:40px;
}

.table{
margin:auto;
margin-top:40px;
border-collapse:collapse;
width:60%;
}

.table th{
background:#007BFF;
color:white;
padding:12px;
}

.table td{
background:white;
padding:12px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<h1>Your Queue History</h1>

<table class="table">

<tr>
<th>Service</th>
<th>Token</th>
<th>Status</th>
</tr>

{% for token in tokens %}

<tr>
<td>{{token.service.name}}</td>
<td>{{token.token_number}}</td>
<td>{{token.status}}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/logout">Logout</a>

</body>
</html>
